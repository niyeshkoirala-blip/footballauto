name: Auto Post Football News

on:
  schedule:
    # BACKSTOP ONLY — the chain sustains itself via workflow_dispatch below.
    # If the chain ever dies, this revives it (cron can be hours late; the
    # self-dispatch at the end of each job is what keeps 24/7 coverage).
    - cron: "3 */5 * * *"

  # Trigger manually from GitHub → Actions tab, and how each job chains the next
  workflow_dispatch:

# Never two daemons at once; a new job replaces a stuck/old one
concurrency:
  group: football-daemon
  cancel-in-progress: true

jobs:
  post-news:
    runs-on: ubuntu-latest
    timeout-minutes: 355   # hard stop under GitHub's 6h job limit
    permissions:
      contents: write   # needed to commit posted_stories.json back
      actions: write    # needed to dispatch the next job in the chain

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run football news bot
        env:
          MAKE_WEBHOOK_URL:       ${{ secrets.MAKE_WEBHOOK_URL }}
          MAKE_REEL_WEBHOOK_URL:  ${{ secrets.MAKE_REEL_WEBHOOK_URL }}
          IMGUR_CLIENT_ID:        ${{ secrets.IMGUR_CLIENT_ID }}
          PEXELS_API_KEY:         ${{ secrets.PEXELS_API_KEY }}
          GROQ_API_KEY:           ${{ secrets.GROQ_API_KEY }}
          PAGE_NAME:              ${{ secrets.PAGE_NAME }}
          FB_PAGE_URL:            ${{ secrets.FB_PAGE_URL }}
          POSTS_PER_RUN:          "2"
          MAX_POSTS_PER_DAY:      "15"
          GROQ_MIN_RATING:        "7"
          BREAKING_THRESHOLD:     "50"
          POST_DELAY_MIN:         "25"
          POST_DELAY_MAX:         "35"
          POLL_SECONDS:           "60"
          MIN_POST_GAP_MIN:       "15"
          MAX_RUNTIME_MIN:        "290"
        run: python main.py --daemon
        

      # Persist the list of posted story IDs so we never repost
      - name: Commit updated posted_stories.json
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted_stories.json
          git diff --staged --quiet || git commit -m "chore: update posted stories [skip ci]"
          git push

      # Keep the 24/7 chain alive: start the next daemon job ourselves.
      # workflow_dispatch fires within seconds — unlike cron, which GitHub
      # may delay by hours. (GITHUB_TOKEN is allowed to trigger
      # workflow_dispatch runs; the no-recursion rule exempts it.)
      - name: Chain next daemon job
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run auto_post.yml --ref main
