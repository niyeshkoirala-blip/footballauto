name: Auto Post Football News

on:
  schedule:
    # Every 30 minutes — posts the top 2 new stories regardless of score
    - cron: "*/30 * * * *"

  # Trigger manually from GitHub → Actions tab
  workflow_dispatch:

jobs:
  post-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit posted_stories.json back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run football news bot
        env:
          FB_EMAIL:            ${{ secrets.FB_EMAIL }}
          FB_PASSWORD:         ${{ secrets.FB_PASSWORD }}
          FB_PAGE_URL:         ${{ secrets.FB_PAGE_URL }}
          PEXELS_API_KEY:      ${{ secrets.PEXELS_API_KEY }}
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          PAGE_NAME:           ${{ secrets.PAGE_NAME }}
          POSTS_PER_RUN:       "15"
          MIN_POSTS_PER_RUN:   "2"
          BREAKING_THRESHOLD:  "50"
          POST_DELAY_MIN:      "25"
          POST_DELAY_MAX:      "35"
        run: python main.py --scheduled

      # Persist the list of posted story IDs so we never repost
      - name: Commit updated posted_stories.json
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted_stories.json
          git diff --staged --quiet || git commit -m "chore: update posted stories [skip ci]"
          git push
